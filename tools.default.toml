# `soul_memory` is enabled by default so stable user profile updates can be
# persisted into the startup SOUL prompt file.
enabled_tools = ["web_search", "calculator", "terminal", "soul_memory"]

[routing.web_search]
timeout_seconds = 20

[routing.calculator]
timeout_seconds = 5

[routing.terminal]
timeout_seconds = 30

[terminal]
blocked_commands = [
  "rm -rf /",
  "shutdown",
  "reboot"
]
