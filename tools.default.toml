# WARNING: `soul_memory` is intentionally disabled by default.
# It persists user-controlled content into a system prompt file and should
# only be enabled after explicit administrative opt-in.
enabled_tools = ["web_search", "calculator", "terminal"]

[routing.web_search]
timeout_seconds = 20

[routing.calculator]
timeout_seconds = 5

[routing.terminal]
timeout_seconds = 30

[terminal]
blocked_commands = [
  "rm -rf /",
  "shutdown",
  "reboot"
]
