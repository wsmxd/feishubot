# `soul_memory` is enabled by default to persist stable user profile facts
# (name, habits, hobbies, preferences) into SOUL.md for better continuity.
enabled_tools = ["web_search", "calculator", "terminal", "soul_memory"]

[routing.web_search]
timeout_seconds = 20

[routing.calculator]
timeout_seconds = 5

[routing.terminal]
timeout_seconds = 30

[routing.soul_memory]
timeout_seconds = 5

[terminal]
blocked_commands = [
  "rm -rf /",
  "shutdown",
  "reboot"
]
