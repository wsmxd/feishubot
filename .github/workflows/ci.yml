name: CI

on:
  pull_request:
    branches: ["*"]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality-and-tests:
    name: Quality and Tests (Python 3.14)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e . ruff

      - name: Ruff format check
        run: |
          ruff format --check .

      - name: Ruff lint and security check
        run: |
          ruff check . --output-format=github

      - name: Architecture guard (PR only)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          python scripts/ci_arch_guard.py --base-ref "${{ github.base_ref }}"

      - name: Sanity check imports
        run: |
          python -c "from feishubot.main import app; print(app.title)"

      - name: Check Python syntax
        run: |
          python -m compileall -q src

      - name: Run tests (if present)
        run: |
          if [ -d tests ]; then
            pip install pytest
            pytest -q
          else
            echo "No tests directory found; skipping pytest."
          fi
