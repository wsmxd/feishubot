name: CI

on:
  pull_request:
    branches: ["*"]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: ["main"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  quality-and-tests:
    name: Quality and Tests (Python 3.14)
    runs-on: ubuntu-latest

    steps:
      - name: PR mergeability guard (conflict check)
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            let pull = null;
            for (let i = 0; i < 6; i += 1) {
              const response = await github.rest.pulls.get({ owner, repo, pull_number });
              pull = response.data;
              if (pull.mergeable_state !== 'unknown' && pull.mergeable_state !== null) {
                break;
              }
              await new Promise((resolve) => setTimeout(resolve, 2000));
            }

            core.info(`PR #${pull_number} mergeable=${pull.mergeable}, mergeable_state=${pull.mergeable_state}`);

            if (pull.mergeable_state === 'dirty') {
              core.setFailed(
                'PR 与 main 存在代码冲突（mergeable_state=dirty）。请先 rebase/merge main 后再推送。'
              );
            }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e . ruff

      - name: Ruff format check
        run: |
          ruff format --check .

      - name: Ruff lint and security check
        run: |
          ruff check . --output-format=github

      - name: Architecture guard (PR only)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          python scripts/ci_arch_guard.py --base-ref "${{ github.base_ref }}"

      - name: Sanity check imports
        run: |
          python -c "from feishubot.main import app; print(app.title)"

      - name: Check Python syntax
        run: |
          python -m compileall -q src

      - name: Run tests (if present)
        run: |
          if [ -d tests ]; then
            pip install pytest
            pytest -q
          else
            echo "No tests directory found; skipping pytest."
          fi
